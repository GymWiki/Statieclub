<!--
  Statieclub — "Confirm signup" e-mailtemplate
  Plakken in: Supabase Dashboard → Authentication → Email Templates → Confirm signup
  Onderwerp (subject) daar instellen op: Bevestig je Statieclub-account

  Vereist vooraf: Custom SMTP ingesteld (Authentication → SMTP Settings),
  anders verstuurt Supabase deze template alsnog vanaf hun eigen adres.
-->
<div style="background-color:#f8fafc;padding:40px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" style="max-width:480px;margin:0 auto;background-color:#ffffff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;">
    <tr>
      <td style="padding:32px 32px 8px;text-align:center;">
        <div style="display:inline-flex;align-items:center;gap:8px;">
          <span style="display:inline-block;width:28px;height:28px;line-height:28px;border-radius:8px;background-color:#0f172a;color:#34d399;font-weight:700;font-size:14px;text-align:center;">S</span>
          <span style="font-weight:700;font-size:16px;color:#0f172a;">Statieclub</span>
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 32px 0;text-align:center;">
        <h1 style="margin:0;font-size:20px;font-weight:700;color:#0f172a;">Bevestig je e-mailadres</h1>
        <p style="margin:12px 0 0;font-size:15px;line-height:1.5;color:#475569;">
          Je hebt een penningmeester-account aangemaakt voor Statieclub. Klik op de knop hieronder om je
          e-mailadres te bevestigen en in te loggen.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:28px 32px;text-align:center;">
        <a href="{{ .ConfirmationURL }}"
           style="display:inline-block;background-color:#10b981;color:#ffffff;font-weight:600;font-size:15px;text-decoration:none;padding:12px 28px;border-radius:9999px;">
          E-mailadres bevestigen
        </a>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 32px;text-align:center;">
        <p style="margin:0;font-size:13px;color:#94a3b8;">
          Heb je geen account aangemaakt? Dan kun je deze e-mail negeren.
        </p>
      </td>
    </tr>
  </table>
</div>
